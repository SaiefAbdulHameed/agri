<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user || user.role !== "admin") {
        window.location.href = "login.html";
    }
</script>

<div class="container">
    <h2>Admin Panel</h2>
    <p>System monitoring & data control</p>

    <ul>
        <li>View farmers</li>
        <li>Manage soil data</li>
        <li>Monitor ML accuracy</li>
    </ul>

    <button onclick="logout()">Logout</button>
</div>

<script>
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>

</body>
</html>
