<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Agriculture Support</title>
    <link rel="stylesheet" href="style.css">
</head>
<script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (!user || user.role !== "farmer") {
        window.location.href = "login.html";
    }
</script>
<body>
    <div class="container">
        <header>
            <h1>Intelligent Agriculture Support</h1>
            <p>Get crop and fertilizer recommendations based on your soil data</p>
        </header>

        <main>
            <section class="form-section">
                <h2>Enter Soil Data</h2>

                <label for="location">Location</label>
                <input type="text" id="location" placeholder="e.g., Karnataka">

                <label for="ph">Soil pH</label>
                <input type="number" id="ph" step="0.1" placeholder="e.g., 6.2">

                <label for="nitrogen">Nitrogen (N)</label>
                <input type="number" id="nitrogen" placeholder="e.g., 40">

                <label for="phosphorus">Phosphorus (P)</label>
                <input type="number" id="phosphorus" placeholder="e.g., 30">

                <label for="potassium">Potassium (K)</label>
                <input type="number" id="potassium" placeholder="e.g., 20">

                <label for="moisture">Soil Moisture (%)</label>
                <input type="number" id="moisture" placeholder="e.g., 55">

                <button onclick="submitForm()">Get Recommendation</button>
            </section>

            <section class="result-section" id="result">
                <h2>Result</h2>
                <p id="crop"></p>
                <p id="fertilizer"></p>
            </section>
        </main>

        <footer>
            <p>© 2026 Intelligent Agriculture Support System</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
